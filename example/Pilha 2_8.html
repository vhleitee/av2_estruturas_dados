<html>
	<head>
		<title>Algoritmo 2.8</title>
	</head>
	<body>
		<script>
			class Pilha{
				constructor(quantidadeMaxima){
					this.M = quantidadeMaxima;
					this.topo = -1;
					this.lista = new Array();
				}
				
				insercaoNaPilha(valor){
					if( this.topo != (this.M - 1) ){
					// ou 
					//if( topo < M ){ // mais eficiente por causa de não usar parenteses e a subtração
						this.topo = this.topo + 1;
						this.lista[this.topo] = valor;
					}
					else{
						throw new Error("overflow");
					}
				}
				
				remocaoDaPilha(){
					if( this.topo != -1 ){
						let valor_recuperado = this.lista[this.topo];
						this.topo = this.topo - 1;
						return valor_recuperado;
					}
					else{
						throw new Error("underflow");
					}
				}
				
				getLista(){
					return this.lista;
				}
				
				getLista(){
					let str  = "";
					for( let i = 0; i <= this.topo; i++ ){
						str = str + " " + this.lista[i] + " ";
					}
					return "[" + str + "]";
				}
			}
			
			// https://dontpad.com/uniasselvi/estrutura
			
			let pilha1 = new Pilha(5);
			pilha1.insercaoNaPilha( 68 );
			console.log( pilha1.getLista() );
			pilha1.insercaoNaPilha( 22 );
			console.log( pilha1.getLista() );
			pilha1.insercaoNaPilha( 14 );

			pilha1.insercaoNaPilha( 12 );
			console.log( pilha1.getLista() );
			pilha1.insercaoNaPilha( 11 );
			console.log( pilha1.getLista() );
			pilha1.insercaoNaPilha( 10 );
			console.log( pilha1.getLista() );
			//pilha1.insercaoNaPilha( 21 );
			//console.log( pilha1.getLista() );

			let RetornoRemocao = pilha1.remocaoDaPilha();
			console.log( "Valor recuperado: " + RetornoRemocao, pilha1.getLista() );

			RetornoRemocao = pilha1.remocaoDaPilha();
			console.log( "Valor recuperado: " + RetornoRemocao, pilha1.getLista() );

			RetornoRemocao = pilha1.remocaoDaPilha();
			console.log( "Valor recuperado: " + RetornoRemocao, pilha1.getLista() );

			RetornoRemocao = pilha1.remocaoDaPilha();
			console.log( "Valor recuperado: " + RetornoRemocao, pilha1.getLista() );

			RetornoRemocao = pilha1.remocaoDaPilha();
			console.log( "Valor recuperado: " + RetornoRemocao, pilha1.getLista() );

			pilha1.insercaoNaPilha( 12,5 );
			console.log( pilha1.getLista() );
						

		</script>
